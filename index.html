<!DOCTYPE html>
<html>
<head>
  <title>Nishit Singh</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0e0e0e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: sans-serif;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 40px 20px;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    /* mobile tweaks */
    @media (max-width: 600px) {
      .container {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <iframe src="home.pdf"></iframe>
  </div>
</body>
</html>
